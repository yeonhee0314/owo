<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>switch</title>
    </head>
    <body>
        <input id="input" type="text" />
        <button id="btn" type="button">확인</button>
        <div id="print"></div>
    </body>
</html>
<script>
    // 입력받은 문자가 "y" or "n"인 경우 작업 수행 / 작업 수행 x
    // "y" or "n"이 아닌 경우 "유효하지 않은 문자입니다."

    // 1. 버튼 요소 가져온 후 클릭 이벤트 등록
    document.getElementById("btn").onclick = function () {
        //2. input 내 value 조회
        let char = document.getElementById("input").value;
        let result = null;

        switch (char) {
            case "y":
                result = "작업을 수행하겠습니다.";
                break;
            case "n":
                result = "작업을 수행하지 않겠습니다.";
                break;
            default:
                result = "유효하지 않는 문자입니다.";
                break;
        }
        
        // 4. div#print에 결과값 반영
        document.getElementById("print").textContent = result;
    };
</script>
